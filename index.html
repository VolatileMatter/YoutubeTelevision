<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetroTube TV</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body>

<div id="app">

  <!-- ── Sidebar ───────────────────────────────────────────── -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <div id="site-title">RetroTube TV</div>
      <div id="site-sub">ON&nbsp;AIR</div>
    </div>
    <div id="channel-list"><!-- built by JS --></div>
    <div id="sidebar-footer">
      <span class="led"></span>LIVE
    </div>
  </aside>

  <!-- ── Screen ────────────────────────────────────────────── -->
  <main id="screen-wrap">

    <div id="yt-player"></div>

    <div id="static-screen">
      <div class="static-noise-bg"></div>
      <div id="static-message">NO SIGNAL</div>
    </div>

    <div id="crt-overlay">
      <div class="crt-blur"></div>
      <div class="crt-scanlines"></div>
      <div class="crt-glow"></div>
      <div class="crt-fringe"></div>
      <div class="crt-noise"></div>
      <div class="crt-vignette"></div>
      <div class="crt-ambient-flicker"></div>
    </div>

    <div class="crt-flicker"></div>

    <!-- Sidebar collapse button -->
    <button class="collapse-btn" id="sidebar-toggle" title="Toggle sidebar">
      <span class="arrow">◀</span>
    </button>

    <!-- Panel collapse button -->
    <button class="collapse-btn" id="panel-toggle" title="Toggle panel">
      <span class="arrow">▶</span>
    </button>

  </main>

  <!-- ── Right Panel ───────────────────────────────────────── -->
  <aside id="panel">
    <div id="panel-inner">

      <!-- Clock -->
      <div id="panel-clock">--:--</div>

      <!-- Now Playing -->
      <div id="panel-now-playing">
        <div id="np-channel">📺&nbsp;&nbsp;RetroTube TV</div>
        <div id="np-detail">Loading…</div>
      </div>

      <!-- Playback controls -->
      <div class="panel-section">
        <div class="panel-title">Playback</div>
        <button id="btn-skip">SKIP ▶▶</button>

        <!-- In Order ←→ Shuffle slider -->
        <div class="mode-slider-wrap">
          <span class="mode-label mode-label--left">IN ORDER</span>
          <input type="range" id="order-shuffle-slider" min="0" max="1" step="1" value="1" />
          <span class="mode-label mode-label--right">SHUFFLE</span>
        </div>
        <div id="mode-indicator">SHUFFLE</div>
      </div>

      <!-- CRT master toggle + intensity -->
      <div class="panel-section">
        <div class="panel-title">CRT</div>
        <button class="toggle-btn on" id="crt-toggle">
          <span class="toggle-dot"></span>SCANLINES
        </button>
        <div class="knob-row" style="margin-top:6px;">
          <span class="knob-label">Intensity</span>
          <input type="range" id="crt-intensity-slider" min="0" max="100" value="40" />
        </div>

        <!-- Collapsible effects palette -->
        <div id="fx-palette-header" class="fx-palette-header">
          <span class="fx-palette-arrow">▶</span>
          <span>Edit TV Effects</span>
        </div>
        <div id="fx-palette-body" class="fx-palette-body">
          <div class="fx-grid">
            <label class="fx-item">
              <input type="checkbox" id="fx-scanlines" checked />
              <span>Scanlines</span>
            </label>
            <label class="fx-item">
              <input type="checkbox" id="fx-glow" checked />
              <span>Glow</span>
            </label>
            <label class="fx-item">
              <input type="checkbox" id="fx-vignette" checked />
              <span>Vignette</span>
            </label>
            <label class="fx-item">
              <input type="checkbox" id="fx-noise" checked />
              <span>Noise</span>
            </label>
            <label class="fx-item">
              <input type="checkbox" id="fx-fringe" checked />
              <span>Fringe</span>
            </label>
            <label class="fx-item">
              <input type="checkbox" id="fx-blur" checked />
              <span>Blur</span>
            </label>
            <label class="fx-item">
              <input type="checkbox" id="fx-flicker" checked />
              <span>Flicker</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Playlist toggles -->
      <div class="panel-section" id="playlist-toggle-section">
        <div class="panel-title">Playlists</div>
        <div id="playlist-toggle-list"><!-- built by JS --></div>
      </div>

      <!-- Watch Log -->
      <div class="watch-log-section">
        <div class="panel-title">Watch Log</div>
        <div id="watch-log-list"><!-- built by JS --></div>
      </div>

    </div>
  </aside>

</div>

<script src="home.js"></script>
</body>
</html>
